<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Potato tuber shape -->
  <ellipse cx="50" cy="50" rx="40" ry="45" fill="#a0826d" stroke="#8b6f47" stroke-width="2"/>
  
  <!-- Potato eyes (sprouts) -->
  <circle cx="35" cy="35" r="5" fill="#8b7355"/>
  <circle cx="65" cy="40" r="4" fill="#8b7355"/>
  <circle cx="45" cy="65" r="4" fill="#8b7355"/>
  <circle cx="70" cy="60" r="3" fill="#8b7355"/>
  
  <!-- Slight shadow for depth -->
  <ellipse cx="50" cy="75" rx="35" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>