server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # React Router: if you refresh /login (or any route), serve index.html
  # instead of returning a 404 for a non-existent physical file.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: cache static assets a bit longer
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}

